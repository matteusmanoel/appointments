AWSTemplateFormatVersion: "2010-09-09"
Description: NavalhIA API - Lambda + API Gateway HTTP API (us-east-1)

Parameters:
  Stage:
    Type: String
    Default: prod
    AllowedValues: [prod, staging]
  ArtifactBucket:
    Type: String
    Description: S3 bucket name where Lambda deployment package is stored
  ArtifactKey:
    Type: String
    Default: api/latest.zip
    Description: S3 object key of the Lambda zip
  DatabaseUrl:
    Type: String
    NoEcho: true
    Description: Postgres connection string (e.g. Supabase)
  JwtSecret:
    Type: String
    NoEcho: true
    Description: JWT signing secret
  CorsOrigin:
    Type: String
    Default: "*"
    Description: CORS allowed origins (comma-separated)
  JwtExpiresIn:
    Type: String
    Default: "7d"
  StripeWebhookSecret:
    Type: String
    NoEcho: true
    Default: ""
    Description: Stripe webhook signing secret (leave empty to disable)
  StripeSecretKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: Stripe secret key for API
  StripePriceId:
    Type: String
    Default: ""
    Description: Stripe Price ID fallback for subscription checkout
  StripePriceIdEssential:
    Type: String
    Default: ""
    Description: Stripe Price ID for Essential plan
  StripePriceIdPro:
    Type: String
    Default: ""
    Description: Stripe Price ID for Pro plan
  StripePriceIdPremium:
    Type: String
    Default: ""
    Description: Stripe Price ID for Premium plan
  StripePriceIdExtraNumber:
    Type: String
    Default: ""
    Description: Stripe Price ID for extra WhatsApp number add-on (optional)
  FromEmail:
    Type: String
    Default: ""
    Description: SES verified sender email for onboarding
  AppUrl:
    Type: String
    Default: ""
    Description: Front app URL for onboarding emails
  AlarmEmail:
    Type: String
    Default: ""
    Description: Optional email for CloudWatch alarm notifications (leave empty to skip SNS)
  UazapiBaseUrl:
    Type: String
    Default: ""
    Description: Uazapi API base URL (e.g. https://free.uazapi.com)
  UazapiAdminToken:
    Type: String
    NoEcho: true
    Default: ""
    Description: Uazapi admin token for creating instances
  UazapiWebhookPublicUrl:
    Type: String
    Default: ""
    Description: Public URL for Uazapi webhook (e.g. https://api.example.com/api/webhooks/uazapi)
  AppEncryptionKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: 32+ char key for encrypting instance tokens (required for WhatsApp connection)
  N8nChatTriggerUrl:
    Type: String
    Default: ""
    Description: n8n chat trigger URL for WhatsApp bot replies (optional)
  OpenAiApiKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: OpenAI API key for AI worker Lambda (optional; leave empty to disable)
  N8nEventsWebhookUrl:
    Type: String
    Default: ""
    Description: n8n outbound events webhook URL for AI worker (optional)
  N8nEventsSecret:
    Type: String
    NoEcho: true
    Default: ""
    Description: Secret for n8n outbound events (optional)
  NativeAiDisabled:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: When true, disables native AI worker replies and ai-simulate endpoints (NATIVE_AI_DISABLED)
  KnowledgeS3Bucket:
    Type: String
    Default: ""
    Description: S3 bucket for knowledge base documents (optional; leave empty to disable RAG)

Conditions:
  HasKnowledgeBucket: !Not [!Equals [!Ref KnowledgeS3Bucket, ""]]

Resources:
  ApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/navalhia-api-${Stage}"
      RetentionInDays: 14

  ApiRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "navalhia-api-${Stage}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole

  ApiRolePolicy:
    Type: AWS::IAM::Policy
    DependsOn: ApiRole
    Properties:
      PolicyName: navalhia-api-logs
      Roles: [!Ref ApiRole]
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - logs:CreateLogStream
              - logs:PutLogEvents
            Resource: !GetAtt ApiLogGroup.Arn
          - Effect: Allow
            Action: ses:SendEmail
            Resource: "*"

  ApiFunction:
    Type: AWS::Lambda::Function
    DependsOn: ApiRolePolicy
    Properties:
      FunctionName: !Sub "navalhia-api-${Stage}"
      Runtime: nodejs20.x
      Handler: dist/lambda.handler
      Code:
        S3Bucket: !Ref ArtifactBucket
        S3Key: !Ref ArtifactKey
      Timeout: 30
      MemorySize: 256
      Role: !GetAtt ApiRole.Arn
      Environment:
        Variables:
          NODE_ENV: production
          DATABASE_URL: !Ref DatabaseUrl
          DATABASE_SSL: "true"
          DATABASE_POOL_MAX: "5"
          JWT_SECRET: !Ref JwtSecret
          JWT_EXPIRES_IN: !Ref JwtExpiresIn
          CORS_ORIGIN: !Ref CorsOrigin
          TOOLS_API_KEY: ""
          PORT: "3000"
          STRIPE_WEBHOOK_SECRET: !Ref StripeWebhookSecret
          STRIPE_SECRET_KEY: !Ref StripeSecretKey
          STRIPE_PRICE_ID: !Ref StripePriceId
          STRIPE_PRICE_ID_ESSENTIAL: !Ref StripePriceIdEssential
          STRIPE_PRICE_ID_PRO: !Ref StripePriceIdPro
          STRIPE_PRICE_ID_PREMIUM: !Ref StripePriceIdPremium
          STRIPE_PRICE_ID_EXTRA_NUMBER: !Ref StripePriceIdExtraNumber
          FROM_EMAIL: !Ref FromEmail
          APP_URL: !Ref AppUrl
          UAZAPI_BASE_URL: !Ref UazapiBaseUrl
          UAZAPI_ADMIN_TOKEN: !Ref UazapiAdminToken
          UAZAPI_WEBHOOK_PUBLIC_URL: !Ref UazapiWebhookPublicUrl
          APP_ENCRYPTION_KEY: !Ref AppEncryptionKey
          N8N_CHAT_TRIGGER_URL: !Ref N8nChatTriggerUrl
          OPENAI_API_KEY: !Ref OpenAiApiKey
          NATIVE_AI_DISABLED: !Ref NativeAiDisabled

  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub "navalhia-${Stage}"
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins: ["*"]
        AllowMethods: ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
        AllowHeaders: ["*"]
        MaxAge: 300

  HttpApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ApiFunction.Arn}/invocations"
      # 1.0 required for custom domain (api.navalhia.com.br): with 2.0, rawPath does not include the full path and Express gets wrong path → 404 on e.g. POST /api/billing/checkout
      PayloadFormatVersion: "1.0"
      TimeoutInMillis: 29000

  ApiGatewayPermission:
    Type: AWS::Lambda::Permission
    DependsOn: HttpApiIntegration
    Properties:
      FunctionName: !Ref ApiFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*"

  HttpApiRoute:
    Type: AWS::ApiGatewayV2::Route
    DependsOn: ApiGatewayPermission
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "$default"
      Target: !Sub "integrations/${HttpApiIntegration}"

  HttpApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: "$default"
      AutoDeploy: true

  # Alarms (no SNS if AlarmEmail empty)
  LambdaErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "navalhia-api-${Stage}-lambda-errors"
      AlarmDescription: Lambda invocation errors
      MetricName: Errors
      Namespace: AWS/Lambda
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: FunctionName
          Value: !Ref ApiFunction
      TreatMissingData: notBreaching
  LambdaDurationAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "navalhia-api-${Stage}-lambda-duration"
      AlarmDescription: Lambda duration high
      MetricName: Duration
      Namespace: AWS/Lambda
      Statistic: Average
      Period: 60
      EvaluationPeriods: 2
      Threshold: 25000
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: FunctionName
          Value: !Ref ApiFunction
      TreatMissingData: notBreaching

  # --- Workers (Lambda + EventBridge) ---
  WorkerAiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/navalhia-worker-ai-${Stage}"
      RetentionInDays: 14
  WorkerScheduledLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/navalhia-worker-scheduled-${Stage}"
      RetentionInDays: 14
  WorkerKnowledgeLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/navalhia-worker-knowledge-${Stage}"
      RetentionInDays: 14

  WorkerAiRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "navalhia-worker-ai-${Stage}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
  WorkerScheduledRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "navalhia-worker-scheduled-${Stage}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
  WorkerKnowledgeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "navalhia-worker-knowledge-${Stage}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole

  WorkerAiRolePolicy:
    Type: AWS::IAM::Policy
    DependsOn: WorkerAiRole
    Properties:
      PolicyName: navalhia-worker-ai-logs
      Roles: [!Ref WorkerAiRole]
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - logs:CreateLogStream
              - logs:PutLogEvents
            Resource: !GetAtt WorkerAiLogGroup.Arn
  WorkerScheduledRolePolicy:
    Type: AWS::IAM::Policy
    DependsOn: WorkerScheduledRole
    Properties:
      PolicyName: navalhia-worker-scheduled-logs
      Roles: [!Ref WorkerScheduledRole]
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - logs:CreateLogStream
              - logs:PutLogEvents
            Resource: !GetAtt WorkerScheduledLogGroup.Arn
  WorkerKnowledgeRolePolicy:
    Type: AWS::IAM::Policy
    DependsOn: WorkerKnowledgeRole
    Properties:
      PolicyName: navalhia-worker-knowledge
      Roles: [!Ref WorkerKnowledgeRole]
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - logs:CreateLogStream
              - logs:PutLogEvents
            Resource: !GetAtt WorkerKnowledgeLogGroup.Arn
          - Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
            Resource: !If
              - HasKnowledgeBucket
              - !Sub "arn:aws:s3:::${KnowledgeS3Bucket}/*"
              - "arn:aws:s3:::no-such-bucket-placeholder"

  WorkerAiFunction:
    Type: AWS::Lambda::Function
    DependsOn: WorkerAiRolePolicy
    Properties:
      FunctionName: !Sub "navalhia-worker-ai-${Stage}"
      Runtime: nodejs20.x
      Handler: dist/workers/lambda-ai.handler
      Code:
        S3Bucket: !Ref ArtifactBucket
        S3Key: !Ref ArtifactKey
      Timeout: 180
      MemorySize: 512
      Role: !GetAtt WorkerAiRole.Arn
      Environment:
        Variables:
          NODE_ENV: production
          DATABASE_URL: !Ref DatabaseUrl
          DATABASE_SSL: "true"
          DATABASE_POOL_MAX: "2"
          JWT_SECRET: !Ref JwtSecret
          APP_ENCRYPTION_KEY: !Ref AppEncryptionKey
          OPENAI_API_KEY: !Ref OpenAiApiKey
          UAZAPI_BASE_URL: !Ref UazapiBaseUrl
          N8N_EVENTS_WEBHOOK_URL: !Ref N8nEventsWebhookUrl
          N8N_EVENTS_SECRET: !Ref N8nEventsSecret
          AI_WORKER_CONCURRENCY: "1"
          AI_JOB_MAX_ATTEMPTS: "5"
          AI_JOB_BACKOFF_BASE_SECONDS: "2"
          NATIVE_AI_DISABLED: !Ref NativeAiDisabled

  WorkerScheduledFunction:
    Type: AWS::Lambda::Function
    DependsOn: WorkerScheduledRolePolicy
    Properties:
      FunctionName: !Sub "navalhia-worker-scheduled-${Stage}"
      Runtime: nodejs20.x
      Handler: dist/workers/lambda-scheduled.handler
      Code:
        S3Bucket: !Ref ArtifactBucket
        S3Key: !Ref ArtifactKey
      Timeout: 60
      MemorySize: 256
      Role: !GetAtt WorkerScheduledRole.Arn
      Environment:
        Variables:
          NODE_ENV: production
          DATABASE_URL: !Ref DatabaseUrl
          DATABASE_SSL: "true"
          DATABASE_POOL_MAX: "2"
          JWT_SECRET: !Ref JwtSecret
          JWT_EXPIRES_IN: !Ref JwtExpiresIn
          APP_ENCRYPTION_KEY: !Ref AppEncryptionKey
          UAZAPI_BASE_URL: !Ref UazapiBaseUrl

  WorkerKnowledgeFunction:
    Type: AWS::Lambda::Function
    DependsOn: WorkerKnowledgeRolePolicy
    Properties:
      FunctionName: !Sub "navalhia-worker-knowledge-${Stage}"
      Runtime: nodejs20.x
      Handler: dist/workers/lambda-knowledge.handler
      Code:
        S3Bucket: !Ref ArtifactBucket
        S3Key: !Ref ArtifactKey
      Timeout: 300
      MemorySize: 512
      Role: !GetAtt WorkerKnowledgeRole.Arn
      Environment:
        Variables:
          NODE_ENV: production
          DATABASE_URL: !Ref DatabaseUrl
          DATABASE_SSL: "true"
          DATABASE_POOL_MAX: "2"
          OPENAI_API_KEY: !Ref OpenAiApiKey
          KNOWLEDGE_S3_BUCKET: !Ref KnowledgeS3Bucket

  WorkerAiScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "navalhia-worker-ai-${Stage}"
      Description: Invoke AI worker every minute
      ScheduleExpression: rate(1 minute)
      State: ENABLED
      Targets:
        - Id: worker-ai
          Arn: !GetAtt WorkerAiFunction.Arn
  WorkerScheduledScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "navalhia-worker-scheduled-${Stage}"
      Description: Invoke scheduled-messages worker every 5 minutes
      ScheduleExpression: rate(5 minutes)
      State: ENABLED
      Targets:
        - Id: worker-scheduled
          Arn: !GetAtt WorkerScheduledFunction.Arn
  WorkerKnowledgeScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "navalhia-worker-knowledge-${Stage}"
      Description: Invoke knowledge worker every 5 minutes
      ScheduleExpression: rate(5 minutes)
      State: ENABLED
      Targets:
        - Id: worker-knowledge
          Arn: !GetAtt WorkerKnowledgeFunction.Arn

  WorkerAiSchedulePermission:
    Type: AWS::Lambda::Permission
    DependsOn: WorkerAiScheduleRule
    Properties:
      FunctionName: !Ref WorkerAiFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt WorkerAiScheduleRule.Arn
  WorkerScheduledSchedulePermission:
    Type: AWS::Lambda::Permission
    DependsOn: WorkerScheduledScheduleRule
    Properties:
      FunctionName: !Ref WorkerScheduledFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt WorkerScheduledScheduleRule.Arn
  WorkerKnowledgeSchedulePermission:
    Type: AWS::Lambda::Permission
    DependsOn: WorkerKnowledgeScheduleRule
    Properties:
      FunctionName: !Ref WorkerKnowledgeFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt WorkerKnowledgeScheduleRule.Arn

Outputs:
  ApiUrl:
    Description: HTTP API base URL (no trailing slash)
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
    Export:
      Name: !Sub "${AWS::StackName}-ApiUrl"
  ApiFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt ApiFunction.Arn
    Export:
      Name: !Sub "${AWS::StackName}-ApiFunctionArn"
  ApiFunctionName:
    Description: Lambda function name for update-function-code
    Value: !Ref ApiFunction
    Export:
      Name: !Sub "${AWS::StackName}-ApiFunctionName"
