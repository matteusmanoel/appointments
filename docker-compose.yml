services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: barberflow
      POSTGRES_DB: barberflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-barberflow_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U barberflow -d barberflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      PORT: 3000
      DATABASE_URL: postgres://barberflow:${POSTGRES_PASSWORD:-barberflow_secret}@db:5432/barberflow
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      TOOLS_API_KEY: ${TOOLS_API_KEY}
      BARBERSHOP_ID: ${BARBERSHOP_ID:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:-}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      N8N_CHAT_TRIGGER_URL: ${N8N_CHAT_TRIGGER_URL:-}
    depends_on:
      db: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    ports:
      - "3003:3000"

